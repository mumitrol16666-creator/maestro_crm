name: Deploy Maestro Ecosystem

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Что деплоить на VPS
        required: true
        default: all
        type: choice
        options:
          - all
          - crm
          - learning-platform

concurrency:
  group: deploy-maestro-ecosystem
  cancel-in-progress: false

jobs:
  verify-crm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Verify CRM backend
        working-directory: backend
        run: |
          npm ci
          node --check src/server.js
          node --check src/middleware/idempotency.js
          node --check src/routes/classes.js
          node --check src/routes/salary.js
          node --check src/routes/users.js
          node --check src/services/lessonLifecycle.js
          npx prisma validate
      - name: Verify CRM frontend
        run: |
          node --check frontend/js/admin.js
          node --check frontend/js/modules/core/navigation.js
          node --check frontend/js/modules/schedule/schedule.js
          node --check frontend/js/modules/salary.js
          node --check frontend/js/modules/users/users.js
          node --check backend/src/routes/integration.js
          node --check backend/src/services/userLink.js
          node --check backend/src/services/integrationRead.js
          node --check backend/src/services/integrationWrite.js
          node --check backend/src/services/operationalReset.js
          node --check backend/src/services/lessonLifecycle.js
          node --check frontend/js/modules/system/operational-reset.js
          test -x deploy/deploy-maestro-all.sh

  deploy:
    needs: verify-crm
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check SSH secret
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Добавьте GitHub Secret SSH_PRIVATE_KEY в репозиторий maestro_crm."
            exit 1
          fi

      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=crm" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/www/maestro_crm
            git fetch "https://github.com/mumitrol16666-creator/maestro_crm.git" main
            git reset --hard FETCH_HEAD
            chmod +x deploy/deploy-maestro-all.sh deploy/deploy.sh
            bash deploy/deploy-maestro-all.sh "${{ steps.target.outputs.value }}"

      - name: Health checks
        if: steps.target.outputs.value == 'all' || steps.target.outputs.value == 'crm'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            for i in {1..10}; do
              if curl -fsS http://127.0.0.1:5000/api/health; then
                echo "Backend health-check passed"
                break
              fi

              echo "Waiting for backend to start... attempt $i/10"
              sleep 3

              if [ "$i" -eq 10 ]; then
                echo "Backend health-check failed"
                pm2 logs maestro-crm-backend --lines 50
                exit 1
              fi
            done

            curl -fsS -o /dev/null https://app-maestro-school.duckdns.org/login.html

      - name: Health checks (Learning Platform)
        if: steps.target.outputs.value == 'all' || steps.target.outputs.value == 'learning-platform'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            for i in {1..10}; do
              if curl -fsS http://127.0.0.1:4000/health; then
                echo "LP API health-check passed"
                break
              fi

              echo "Waiting for LP API... attempt $i/10"
              sleep 3

              if [ "$i" -eq 10 ]; then
                echo "LP API health-check failed"
                pm2 logs maestro-api --lines 50
                exit 1
              fi
            done

            curl -fsS -o /dev/null https://maestro-school.duckdns.org/
