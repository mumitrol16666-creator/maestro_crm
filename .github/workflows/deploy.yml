name: Deploy CRM to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-maestro-crm-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Verify backend
        working-directory: backend
        run: |
          npm ci
          node --check src/server.js
          npx prisma validate

      - name: Verify critical frontend
        run: |
          node --check frontend/js/admin.js
          node --check frontend/js/modules/core/navigation.js

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check SSH secret
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::GitHub Secret SSH_PRIVATE_KEY не задан в репозитории maestro_crm."
            echo "::error::Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Скопируйте тот же ключ, что используется в репозитории Learning Platform."
            exit 1
          fi

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail
            export PUBLIC_DOMAIN="app-maestro-school.duckdns.org"
            APP_DIR="/var/www/maestro_crm"

            if [ ! -d "$APP_DIR/backend" ]; then
              echo "CRM not found at $APP_DIR" >&2
              exit 1
            fi
            if [ ! -f "$APP_DIR/backend/.env" ]; then
              echo "backend/.env missing on server" >&2
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            cd backend
            npm ci --omit=dev
            npx prisma generate
            npx prisma db push

            if pm2 describe maestro-crm-backend >/dev/null 2>&1; then
              pm2 restart maestro-crm-backend
            else
              pm2 start ecosystem.config.js
            fi
            pm2 save

            curl -fsS http://127.0.0.1:5000/api/health
            curl -fsS -o /dev/null "https://${PUBLIC_DOMAIN}/login.html"
            echo "Deploy OK"

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -fsS http://127.0.0.1:5000/api/health
            curl -fsS -o /dev/null https://app-maestro-school.duckdns.org/login.html
