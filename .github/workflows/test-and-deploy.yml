name: Test and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install system dependencies for MongoDB
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4 openssl liblzma5
    
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
    
    - name: Run tests
      run: |
        cd backend
        npm test
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        NODE_ENV: test
        CI: true
      timeout-minutes: 3
      continue-on-error: true
    
    - name: Show test coverage
      run: |
        cd backend
        npm run test:coverage
      continue-on-error: true

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to production server
      uses: appleboy/ssh-action@v1.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ACTOR: ${{ github.actor }}
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        envs: GITHUB_TOKEN,GITHUB_ACTOR
        script: |
          echo "🚀 STARTING NUCLEAR DEPLOYMENT..."
          
          # 1. Stop Services
          echo "🛑 Stopping services..."
          service nginx stop || echo "⚠️ Nginx stop failed"
          pm2 delete all || true
          
          # 2. Clear Nginx Cache (Aggressive)
          echo "🧹 Clearing Nginx cache..."
          rm -rf /var/cache/nginx/*
          
          # 3. Force Code Update
          echo "📥 Updating code..."
          cd /root/sense-of-dance
          git fetch --all
          git reset --hard origin/main
          
          # 4. Anti-Cache Timestamp Update (CRITICAL)
          echo "🕒 Touching files to defeat cache..."
          find frontend -name "*.html" -exec touch {} \;
          find frontend -name "*.js" -exec touch {} \;
          find frontend -name "*.css" -exec touch {} \;
          
          # 5. Backend Setup
          echo "📦 Backend setup..."
          cd backend
          npm install --production
          
          # 6. Run Migrations & Configs
          node migrate-phone-digits.js || true
          node update-commission-config.js || true
          node seed-blog-posts.js || true
          node update-teacher-visibility.js || true
          
          # 7. Start Services
          echo "🚀 Starting PM2..."
          pm2 start ecosystem.config.js
          pm2 save
          
          # 8. Start Nginx
          echo "🌐 Starting Nginx..."
          service nginx start
          nginx -t && nginx -s reload
          
          echo "✅ NUCLEAR DEPLOYMENT COMPLETED."
          pm2 status

