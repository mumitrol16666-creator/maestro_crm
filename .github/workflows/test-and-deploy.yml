name: Test and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install system dependencies for MongoDB
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4 openssl liblzma5
    
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
    
    - name: Run tests
      run: |
        cd backend
        npm test
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        NODE_ENV: test
        CI: true
      timeout-minutes: 3
    
    - name: Show test coverage
      run: |
        cd backend
        npm run test:coverage
      continue-on-error: true

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to production server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        script: |
          echo "🚀 Starting deployment..."
          
          # Переходим в папку проекта (измени путь если нужно)
          cd /root/sense-of-dance || exit 1
          
          # Останавливаем приложение
          echo "⏸️  Stopping application..."
          pm2 stop sense-of-dance-backend || true
          pm2 stop sense-of-dance-frontend || true
          
          # Получаем последние изменения (жестко перезаписываем локальные изменения)
          echo "📥 Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main
          
          # Обновляем зависимости backend
          echo "📦 Installing backend dependencies..."
          cd backend
          npm install --production
          
          # Запускаем миграцию данных (если нужно)
          echo "🔄 Running data migration..."
          node migrate-phone-digits.js || echo "⚠️  Migration skipped or failed (non-critical)"
          
          # Обновление конфигурации комиссий (удалить старую, создать новую с правильными %)
          echo "⚙️  Updating commission config..."
          node update-commission-config.js || echo "⚠️  Commission config update failed"
          
          # Наполнить блог начальными статьями (если пусто)
          echo "📝 Seeding blog posts..."
          node seed-blog-posts.js || echo "ℹ️  Blog posts already exist or skipped"
          
          # Обновить видимость вкладок для преподавателей
          echo "👨‍🏫 Updating teacher visibility..."
          node update-teacher-visibility.js || echo "⚠️  Teacher visibility update failed"
          
          # Настраиваем health check скрипт
          echo "🏥 Setting up health check..."
          chmod +x health-check.sh
          
          # Добавляем в crontab если еще нет
          (crontab -l 2>/dev/null | grep -v health-check.sh; echo "*/5 * * * * /root/sense-of-dance/backend/health-check.sh") | crontab -
          
          cd ..
          
          # Удаляем все старые процессы и дубликаты
          echo "🧹 Cleaning up old processes..."
          pm2 delete all || true
          
          # Запускаем приложение с обновленным конфигом
          echo "🚀 Starting application..."
          cd backend
          pm2 start ecosystem.config.js
          cd ..
          pm2 start python3 --name sense-of-dance-frontend --cwd frontend -- -m http.server 3000
          
          # Сохраняем конфигурацию PM2
          pm2 save
          
          echo "✅ Deployment completed successfully!"
          pm2 status

