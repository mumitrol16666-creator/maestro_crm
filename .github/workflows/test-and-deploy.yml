name: Test and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install system dependencies for MongoDB
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4 openssl liblzma5
    
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
    
    - name: Run tests
      run: |
        cd backend
        npm test
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        NODE_ENV: test
        CI: true
      timeout-minutes: 3
      continue-on-error: true

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to production server
      uses: appleboy/ssh-action@v1.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ACTOR: ${{ github.actor }}
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        envs: GITHUB_TOKEN,GITHUB_ACTOR
        script: |
          echo "🚀 Starting Docker deployment..."
          cd /root/sense-of-dance || exit 1
          
          echo "📥 Pulling latest code..."
          # Используем SSH для пула, если настроено, или токен
          git fetch --all || { echo "❌ Git fetch failed!"; exit 1; }
          git reset --hard origin/main
          
          echo "✅ Code updated to:"
          git log -1 --oneline
          
          echo "🧹 Cleaning up legacy PM2 processes..."
          pm2 delete all || true
          
          echo "🐳 Building and starting containers..."
          docker compose up --build -d --remove-orphans
          
          echo "🔄 Running post-deploy scripts..."
          sleep 5
          docker compose exec -T backend node migrate-phone-digits.js || echo "⚠️ Migration skipped"
          docker compose exec -T backend node seed-blog-posts.js || echo "⚠️ Seeding skipped"
          docker compose exec -T backend node update-teacher-visibility.js || echo "⚠️ Visibility update skipped"
          
          echo "🧹 Pruning unused Docker images..."
          docker image prune -f
          
          echo "✅ Deployment completed successfully!"
          docker compose ps