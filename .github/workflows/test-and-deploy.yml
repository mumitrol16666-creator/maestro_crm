name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to production server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          echo "🚀 Starting deployment on $(hostname)..."
          
          # Переходим в директорию проекта
          cd /root/sense-of-dance || { echo "❌ Project directory not found!"; exit 1; }
          
          echo "📥 Pulling latest code..."
          git fetch --all || { echo "❌ Git fetch failed!"; exit 1; }
          git reset --hard origin/main
          
          echo "✅ Code updated to:"
          git log -1 --oneline
          
          echo "🧹 Stopping old PM2 processes (if any)..."
          pm2 delete all 2>/dev/null || true
          pm2 kill 2>/dev/null || true
          
          echo "🐳 Creating Docker network (if not exists)..."
          docker network create sense-of-dance_default 2>/dev/null || true
          
          echo "🐳 Building and starting containers..."
          docker compose down --remove-orphans || true
          docker compose up --build -d
          
          echo "⏳ Waiting for services to start..."
          sleep 10
          
          echo "🧹 Pruning unused Docker images..."
          docker image prune -f
          
          echo "✅ Deployment completed!"
          docker compose ps
          echo ""
          echo "🔍 Backend health check:"
          curl -s http://localhost:5000/api/health || echo "⚠️ Health check failed (may need more time)"