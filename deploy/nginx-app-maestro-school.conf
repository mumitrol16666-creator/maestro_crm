# Nginx for app-maestro-school.duckdns.org (Maestro CRM)
# Learning Platform stays on maestro-school.duckdns.org — do not modify that vhost.
#
# Install on server:
#   cp /var/www/maestro_crm/deploy/nginx-app-maestro-school.conf /etc/nginx/sites-available/maestro-crm
#   ln -sf /etc/nginx/sites-available/maestro-crm /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d app-maestro-school.duckdns.org

server {
    listen 80;
    server_name app-maestro-school.duckdns.org;
    client_max_body_size 28M;

    root /var/www/maestro_crm/frontend;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml;

    location /api/ {
        client_max_body_size 28M;
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        if ($args ~ "v=") {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        if ($args !~ "v=") {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    location / {
        try_files /public$uri /public$uri.html /public$uri/index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
