version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sense-of-dance-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - NODE_ENV=production
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend/sessions:/app/sessions # Persist sessions if stored in files
    # networks:
    #   - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sense-of-dance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    # networks:
    #   - app-network

# networks:
#   app-network:
#     driver: bridge
