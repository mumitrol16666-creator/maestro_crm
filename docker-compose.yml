version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sense-of-dance-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - NODE_ENV=production
      - REDIS_HOST=redis
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend/sessions:/app/sessions # Persist sessions if stored in files
    depends_on:
      - redis
    networks:
      default:
        aliases:
          - backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sense-of-dance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      default:

  redis:
    image: redis:alpine
    container_name: sense-of-dance-redis
    restart: unless-stopped
    networks:
      default:
        aliases:
          - redis

networks:
  default:
    name: sense-of-dance_default
    external: true
