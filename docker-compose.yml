services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maestro-crm-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - NODE_ENV=production
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://maestro:maestro@db:5432/maestro_crm?schema=public
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend/sessions:/app/sessions
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: maestro-crm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

  redis:
    image: redis:alpine
    container_name: maestro-crm-redis
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: maestro-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: maestro
      POSTGRES_PASSWORD: your_postgres_password
      POSTGRES_DB: maestro_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
