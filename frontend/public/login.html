<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Вход в CRM — Музыкальная школа Maestro">
    <title>Вход | Maestro CRM</title>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/assets/images/maestro-icon.svg">
    <link rel="apple-touch-icon" href="/assets/images/maestro-icon.svg">

    <link rel="stylesheet" href="/css/styles.css?v=maestro1">
    <link rel="stylesheet" href="/css/maestro-brand.css?v=maestro1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">

    <style>
        /* Дополнительные стили для страницы входа */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--black);
            position: relative;
            overflow: hidden;
            padding: 50px 20px;
        }

        .auth-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
            opacity: 0.05;
            animation: pulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        .auth-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            background: var(--gray);
            padding: 60px 50px;
            border: 2px solid var(--gray-light);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .auth-logo {
            margin-bottom: 30px;
        }

        .auth-logo img {
            width: 52px;
            height: 52px;
            object-fit: contain;
            border-radius: 12px;
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            letter-spacing: 0.1em;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .auth-field {
            position: relative;
        }

        .auth-field input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--gray-light);
            padding: 15px 0;
            font-family: var(--font-main);
            font-size: 1rem;
            color: var(--white);
            transition: border-color 0.3s ease;
        }

        .auth-field input:focus {
            outline: none;
            border-bottom-color: var(--pink);
        }

        .auth-field label {
            position: absolute;
            left: 0;
            top: 15px;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: var(--white);
            opacity: 0.5;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .auth-field input:focus+label,
        .auth-field input:not(:placeholder-shown)+label {
            top: -20px;
            font-size: 0.75rem;
            color: var(--pink);
        }

        .auth-field input::placeholder {
            opacity: 0;
        }

        .auth-submit {
            margin-top: 20px;
            padding: 18px;
            background: transparent;
            border: 2px solid var(--pink);
            color: var(--white);
            font-family: var(--font-main);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .auth-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--pink);
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.4s ease;
            z-index: -1;
        }

        .auth-submit:hover::before {
            transform: scaleY(1);
        }

        .auth-submit:hover {
            color: var(--black);
        }

        .auth-submit:active {
            transform: scale(0.98);
        }

        .auth-links {
            margin-top: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .auth-links a:hover {
            opacity: 1;
            color: var(--pink);
        }

        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--white);
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            opacity: 0.7;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-link:hover {
            opacity: 1;
            color: var(--pink);
            transform: translateX(-5px);
        }

        .error-message {
            background: rgba(255, 0, 80, 0.1);
            border-left: 3px solid var(--pink);
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--pink);
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideInDown 0.3s ease;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 40px 30px;
            }

            .back-link {
                top: 20px;
                left: 20px;
                font-size: 0.8rem;
            }
        }

        /* Возвращаем стандартный курсор на странице входа */
        body,
        html,
        * {
            cursor: auto !important;
        }
    </style>
</head>

<body>
    <!-- Кнопка "Назад" -->
    <a href="index" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        <span>НАЗАД</span>
    </a>

    <div class="auth-page">
        <div class="auth-bg"></div>

        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo maestro-text-logo">
                    <img class="maestro-text-logo__img" src="/assets/images/maestro-icon.svg" alt="Maestro" width="44" height="44">
                    <span>
                        <span class="maestro-text-logo__title">Maestro</span>
                        <span class="maestro-text-logo__subtitle">Музыкальная школа</span>
                    </span>
                </div>
                <h1 class="auth-title">ВХОД</h1>
                <p class="auth-subtitle">CRM ШКОЛЫ</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form class="auth-form" id="loginForm">
                <div class="auth-field">
                    <input type="tel" id="phone" name="phone" required placeholder=" ">
                    <label for="phone">ТЕЛЕФОН</label>
                </div>

                <div class="auth-field">
                    <input type="password" id="password" name="password" required placeholder=" ">
                    <label for="password">ПАРОЛЬ</label>
                </div>

                <button type="submit" class="auth-submit">ВОЙТИ</button>
            </form>

            <div class="auth-links">
                <a href="#" id="forgotPassword" style="color: var(--pink);">Забыли пароль?</a>
            </div>

            <div
                style="text-align: center; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.9em; opacity: 0.8;">
                <p style="margin: 0;">Нет аккаунта?</p>
                <p id="noAccountContact" style="margin: 5px 0 0 0; color: var(--pink);">Обратитесь в школу Maestro</p>
            </div>
        </div>
    </div>

    <script src="/js/brand.js?v=maestro1"></script>
    <script src="/js/config.js?v=8"></script>
    <!-- Main script is inlined in this file or handled by modules -->
    <script>
        // Форматирование телефона
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^\d+]/g, '');
            if (value.startsWith('8')) {
                value = '+7' + value.substring(1);
            } else if (value.length > 0 && !value.startsWith('+')) {
                value = '+' + value;
            }
            if (value.length > 0) {
                value = '+' + value.replace(/\+/g, '');
            }
            if (value.length > 16) {
                value = value.substring(0, 16);
            }
            e.target.value = value;
        });

        // Обработка формы входа
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Очищаем номер от лишних символов (оставляем только плюс и цифры)
            const rawPhone = document.getElementById('phone').value;
            const phone = rawPhone.replace(/[^\d+]/g, '');
            const password = document.getElementById('password').value;

            // Скрываем ошибку
            errorMessage.classList.remove('show');

            // BACKEND API: Реальная авторизация
            try {
                console.log('Попытка входа (очищенный номер):', phone);

                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone, password })
                });

                // Проверяем, что ответ валидный
                if (!response.ok && response.status >= 500) {
                    throw new Error(`Сервер недоступен (${response.status}). Попробуйте позже.`);
                }

                // Проверяем, что ответ JSON
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    throw new Error(`Неверный формат ответа от сервера: ${text.substring(0, 100)}`);
                }

                const data = await response.json();
                console.log('Ответ сервера:', data);

                if (response.ok && data.success) {
                    // Сохраняем токен и данные пользователя
                    localStorage.setItem('token', data.token);  // ✅ ИСПРАВЛЕНО: было authToken, должно быть token
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userId', data.user._id);  // ✅ ИСПРАВЛЕНО: _id вместо id
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userPhone', data.user.phone);
                    localStorage.setItem('userRole', data.user.role);

                    // Показываем уведомление
                    if (typeof showNotification !== 'undefined') {
                        showNotification(notificationWithIcon('party', 'Вход выполнен успешно!'));
                    }

                    // Перенаправляем в зависимости от роли
                    setTimeout(() => {
                        // Админка для: super_admin, admin, sales_manager, teacher
                        if (['super_admin', 'admin', 'sales_manager', 'teacher'].includes(data.user.role)) {
                            window.location.href = '/admin.html';
                        } else {
                            window.location.href = '/profile.html'; // Ученик → профиль
                        }
                    }, 500);
                } else {
                    // Показываем ошибку от сервера
                    errorMessage.textContent = data.error || 'Неверный телефон или пароль';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                console.error('Ошибка входа:', error);
                // Показываем понятное сообщение об ошибке
                if (error.message) {
                    errorMessage.textContent = error.message;
                } else if (error.name === 'SyntaxError' || error.message.includes('JSON')) {
                    errorMessage.textContent = 'Сервер вернул неверный формат данных. Попробуйте позже.';
                } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    errorMessage.textContent = 'Не удалось подключиться к серверу. Проверьте интернет-соединение.';
                } else {
                    errorMessage.textContent = 'Ошибка подключения к серверу. Попробуйте позже.';
                }
                errorMessage.classList.add('show');
            }
        });

        // Восстановление пароля
        document.getElementById('forgotPassword').addEventListener('click', (e) => {
            e.preventDefault();

            const msg = typeof getMaestroSupportMessage === 'function'
                ? getMaestroSupportMessage()
                : 'Свяжитесь с администратором школы Maestro';
            if (typeof showNotification !== 'undefined') {
                showNotification(msg);
            } else {
                alert(msg);
            }
        });

        // Проверка - если уже залогинен, редиректим в зависимости от роли
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        const userRole = localStorage.getItem('userRole');
        const token = localStorage.getItem('token');

        if (isLoggedIn && token && userRole) {
            // Админка для: super_admin, admin, sales_manager, teacher
            if (['super_admin', 'admin', 'sales_manager', 'teacher'].includes(userRole)) {
                window.location.href = '/admin.html';
            } else {
                // Ученик → профиль
                window.location.href = '/profile.html';
            }
        }

        const contactEl = document.getElementById('noAccountContact');
        if (contactEl) {
            const support = typeof getMaestroSupportText === 'function' ? getMaestroSupportText() : '';
            contactEl.textContent = support
                ? `Обратитесь в школу Maestro: ${support}`
                : 'Обратитесь в школу Maestro';
        }
    </script>
</body>

</html>
