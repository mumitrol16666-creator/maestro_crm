<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Monitor - Sense of Dance</title>
    <link rel="stylesheet" href="/css/admin-styles.css?v=70">
    <style>
        .performance-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: var(--dark-bg);
            min-height: 100vh;
        }
        
        .performance-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .performance-header h1 {
            color: var(--white);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .performance-header p {
            color: var(--gray-light);
            font-size: 1.1rem;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        
        .metric-card h3 {
            color: var(--white);
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        
        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--pink);
            margin-bottom: 5px;
        }
        
        .metric-label {
            color: var(--gray-light);
            font-size: 0.9rem;
        }
        
        .refresh-btn {
            background: var(--pink);
            color: var(--white);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: var(--pink-dark);
            transform: translateY(-2px);
        }
        
        .loading {
            text-align: center;
            color: var(--gray-light);
            font-size: 1.1rem;
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="performance-container">
        <div class="performance-header">
            <h1>📊 Performance Monitor</h1>
            <p>Мониторинг производительности приложения</p>
        </div>
        
        <button class="refresh-btn" onclick="loadPerformanceData()">
            🔄 Обновить данные
        </button>
        
        <div id="performanceContent">
            <div class="loading">Загрузка метрик...</div>
        </div>
    </div>

    <script>
        async function loadPerformanceData() {
            const content = document.getElementById('performanceContent');
            content.innerHTML = '<div class="loading">Загрузка метрик...</div>';
            
            try {
                const response = await fetch('/api/performance/stats');
                const data = await response.json();
                
                if (data.success) {
                    displayPerformanceData(data.stats);
                } else {
                    content.innerHTML = '<div class="error">Ошибка загрузки данных</div>';
                }
            } catch (error) {
                console.error('Error loading performance data:', error);
                content.innerHTML = '<div class="error">Ошибка подключения к серверу</div>';
            }
        }
        
        function displayPerformanceData(stats) {
            const content = document.getElementById('performanceContent');
            
            if (stats.message) {
                content.innerHTML = `
                    <div class="metric-card">
                        <h3>📊 Статистика</h3>
                        <div class="metric-value">${stats.message}</div>
                        <div class="metric-label">Данные пока не собраны</div>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = `
                <div class="metrics-grid">
                    <div class="metric-card">
                        <h3>📊 Общая статистика</h3>
                        <div class="metric-value">${stats.totalMetrics}</div>
                        <div class="metric-label">Всего метрик</div>
                    </div>
                    
                    <div class="metric-card">
                        <h3>❌ Ошибки</h3>
                        <div class="metric-value">${stats.totalErrors}</div>
                        <div class="metric-label">Всего ошибок</div>
                    </div>
                    
                    <div class="metric-card">
                        <h3>⏱️ Время загрузки</h3>
                        <div class="metric-value">${stats.averageLoadTime}ms</div>
                        <div class="metric-label">Среднее время загрузки</div>
                    </div>
                    
                    <div class="metric-card">
                        <h3>🚀 DOM Ready</h3>
                        <div class="metric-value">${stats.averageDomContentLoaded}ms</div>
                        <div class="metric-label">Среднее время DOM</div>
                    </div>
                    
                    <div class="metric-card">
                        <h3>🌐 TTFB</h3>
                        <div class="metric-value">${stats.averageTtfb}ms</div>
                        <div class="metric-label">Время до первого байта</div>
                    </div>
                    
                    <div class="metric-card">
                        <h3>🕒 Последнее обновление</h3>
                        <div class="metric-value">${stats.lastUpdated ? new Date(stats.lastUpdated).toLocaleString('ru-RU') : 'Нет данных'}</div>
                        <div class="metric-label">Время последней метрики</div>
                    </div>
                </div>
            `;
        }
        
        // Загружаем данные при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadPerformanceData);
    </script>
</body>
</html>
