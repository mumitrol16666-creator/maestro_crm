<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Регистрация в Sense of Dance">
    <title>Регистрация | Sense of Dance</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon.PNG">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon.PNG">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/favicon.PNG">
    <link rel="shortcut icon" href="../assets/images/favicon.PNG">
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--black);
            position: relative;
            overflow: hidden;
            padding: 50px 20px;
        }

        .auth-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
            opacity: 0.05;
            animation: pulse 4s ease-in-out infinite;
        }

        .auth-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            background: var(--gray);
            padding: 60px 50px;
            border: 2px solid var(--gray-light);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .auth-logo {
            margin-bottom: 30px;
        }

        .auth-logo img {
            height: 60px;
            width: auto;
            object-fit: contain;
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            letter-spacing: 0.1em;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .auth-field {
            position: relative;
        }

        .auth-field input,
        .auth-field select {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--gray-light);
            padding: 15px 0;
            font-family: var(--font-main);
            font-size: 1rem;
            color: var(--white);
            transition: border-color 0.3s ease;
        }

        .auth-field input:focus,
        .auth-field select:focus {
            outline: none;
            border-bottom-color: var(--pink);
        }

        .auth-field label {
            position: absolute;
            left: 0;
            top: 15px;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: var(--white);
            opacity: 0.5;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .auth-field input:focus + label,
        .auth-field input:not(:placeholder-shown) + label,
        .auth-field select:focus + label,
        .auth-field select:valid + label {
            top: -20px;
            font-size: 0.75rem;
            color: var(--pink);
        }

        .auth-field input::placeholder {
            opacity: 0;
        }

        .auth-field select {
            appearance: none;
            cursor: pointer;
        }

        .auth-field select option {
            background: var(--black);
            color: var(--white);
        }

        .auth-submit {
            margin-top: 20px;
            padding: 18px;
            background: transparent;
            border: 2px solid var(--pink);
            color: var(--white);
            font-family: var(--font-main);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .auth-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--pink);
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.4s ease;
            z-index: -1;
        }

        .auth-submit:hover::before {
            transform: scaleY(1);
        }

        .auth-submit:hover {
            color: var(--black);
        }

        .auth-submit:active {
            transform: scale(0.98);
        }

        .auth-links {
            margin-top: 30px;
            text-align: center;
        }

        .auth-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .auth-links a:hover {
            opacity: 1;
            color: var(--pink);
        }

        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--white);
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            opacity: 0.7;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-link:hover {
            opacity: 1;
            color: var(--pink);
            transform: translateX(-5px);
        }

        .error-message {
            background: rgba(255, 0, 80, 0.1);
            border-left: 3px solid var(--pink);
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--pink);
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideInDown 0.3s ease;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-hint {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: -20px;
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 40px 30px;
            }

            .back-link {
                top: 20px;
                left: 20px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Кастомный курсор -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- Кнопка "Назад" -->
    <a href="index.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        <span>НАЗАД</span>
    </a>

    <div class="auth-page">
        <div class="auth-bg"></div>
        
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">
                    <img src="../assets/images/logo-splash.PNG" alt="Sense of Dance">
                </div>
                <h1 class="auth-title">РЕГИСТРАЦИЯ</h1>
                <p class="auth-subtitle">СОЗДАТЬ АККАУНТ</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form class="auth-form" id="registerForm">
                <div class="auth-field">
                    <input type="text" id="name" name="name" required placeholder=" ">
                    <label for="name">ПОЛНОЕ ИМЯ</label>
                </div>

                <div class="auth-field">
                    <input type="tel" id="phone" name="phone" required placeholder=" ">
                    <label for="phone">ТЕЛЕФОН</label>
                </div>

                <div class="auth-field">
                    <input type="email" id="email" name="email" placeholder=" ">
                    <label for="email">EMAIL (ОПЦИОНАЛЬНО)</label>
                </div>

                <div class="auth-field">
                    <input type="password" id="password" name="password" required placeholder=" " minlength="6">
                    <label for="password">ПАРОЛЬ</label>
                </div>
                <p class="password-hint">Минимум 6 символов</p>

                <div class="auth-field">
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder=" " minlength="6">
                    <label for="confirmPassword">ПОВТОРИТЕ ПАРОЛЬ</label>
                </div>

                <button type="submit" class="auth-submit">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            </form>

            <div class="auth-links">
                <a href="login.html">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </div>

    <script src="../js/script.js?v=3"></script>
    <script>
        // Форматирование телефона
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            
            if (value.length > 0) {
                if (value[0] === '8') {
                    value = '7' + value.substring(1);
                } else if (value[0] !== '7') {
                    value = '7' + value;
                }
                
                let formattedValue = '+7';
                
                if (value.length > 1) {
                    formattedValue += ' (' + value.substring(1, 4);
                }
                if (value.length >= 4) {
                    formattedValue += ') ' + value.substring(4, 7);
                }
                if (value.length >= 7) {
                    formattedValue += '-' + value.substring(7, 9);
                }
                if (value.length >= 9) {
                    formattedValue += '-' + value.substring(9, 11);
                }
                
                e.target.value = formattedValue;
            }
        });

        // Обработка формы регистрации
        const registerForm = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Скрываем ошибку
            errorMessage.classList.remove('show');

            // Проверка паролей
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Пароли не совпадают';
                errorMessage.classList.add('show');
                return;
            }

            if (password.length < 6) {
                errorMessage.textContent = 'Пароль должен быть минимум 6 символов';
                errorMessage.classList.add('show');
                return;
            }

            // TODO: Когда будет backend, отправим на API
            // Сейчас - демо режим
            
            console.log('Регистрация:', { name, phone, email, password });

            // Временное сохранение
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userPhone', phone);
            localStorage.setItem('userName', name);
            localStorage.setItem('userEmail', email);
            
            // Показываем уведомление
            if (typeof showNotification !== 'undefined') {
                showNotification('Регистрация успешна! Добро пожаловать!');
            }
            
            // Перенаправляем в профиль через 1 секунду
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1000);
        });

        // Проверка - если уже залогинен
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
