# HTTP -> HTTPS redirect для домена
server {
    listen 80;
    server_name senseofdance.kz www.senseofdance.kz;
    return 301 https://$server_name$request_uri;
}

# HTTP для IP (без редиректа)
server {
    listen 80 default_server;
    server_name 149.33.0.114;

    root /root/sense-of-dance/frontend;

    # Backend API proxy
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CSS, JS, assets - напрямую из /frontend/
    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /js/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # HTML files - из /frontend/public/
    location / {
        try_files /public$uri /public$uri.html /public$uri/index.html =404;
    }
}

# HTTPS для домена
server {
    listen 443 ssl http2;
    server_name senseofdance.kz www.senseofdance.kz;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/senseofdance.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/senseofdance.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /root/sense-of-dance/frontend;

    # Backend API proxy
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CSS, JS, assets - напрямую из /frontend/
    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /js/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # HTML files - из /frontend/public/
    location / {
        try_files /public$uri /public$uri.html /public$uri/index.html =404;
    }
}
