# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name senseofdance.kz www.senseofdance.kz;
    return 301 https://$server_name$request_uri;
}

# HTTPS configuration
server {
    listen 443 ssl http2;
    server_name senseofdance.kz www.senseofdance.kz;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/senseofdance.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/senseofdance.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Frontend static files
    root /root/sense-of-dance/frontend/public;
    index index.html;

    # Backend API proxy
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files with clean URLs (без .html)
    location / {
        # Сначала пробуем точный файл, потом .html, потом директорию
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

