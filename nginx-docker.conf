# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name senseofdance.kz www.senseofdance.kz;
    return 301 https://$server_name$request_uri;
}

# HTTP for IP (direct access, no SSL redirect forced here to avoid loops if accessed via IP)
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        if ($args ~ "v=") {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        if ($args !~ "v=") {
             add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    location / {
        try_files /public$uri /public$uri.html /public$uri/index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name senseofdance.kz www.senseofdance.kz;

    # Mapped certificates
    ssl_certificate /etc/letsencrypt/live/senseofdance.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/senseofdance.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
